<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <!--Google Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;500;700&display=swap" rel="stylesheet"> 
    <title>Form Validator</title>
</head>
<body>
    <div class="screen">
        <div class="left-side-illustration">
            <img src="images/mine-bitcoin.jpg" alt="" class="image-none">
        </div>
        <div class="right-side">
            <h1 class="right-side__title">Create an account</h1>
            <form method="POST" action="cadastro.php" class="right-side__form form-validator">
                <label>
                    <h3 class="form__title">Name:</h3>
                    <input type="text" name ="name" data-rules="required|min=2"> 
                </label>
                <label>
                    <h3 class="form__title">E-mail:</h3>
                    <input type="text" name ="email" data-rules="required|email">
                </label>
                <label>
                    <h3 class="form__title">Password:</h3>
                    <input type="password" name ="password" data-rules="required|min=4"> 
                </label>
                <label>
                    <input type="submit" value ="Register" class="btn-register">
                </label>
            </form>

           <div class="enther-the-account">
                <h3 class="enther-the-account__title">Already have an account? <a href="#">Log in</a></h3> 
            </div>
        </div>
    </div>
  <script  src="index.js"></script>
</body>
</html>
